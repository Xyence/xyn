name: Runtime Artifact Storage (MinIO/S3)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "core/artifact_store.py"
      - "core/api/artifacts.py"
      - "core/runtime_execution.py"
      - "core/log_capture.py"
      - "core/tests/test_artifact_store.py"
      - "core/tests/test_runtime_s3_minio_integration.py"
      - "scripts/validate_runtime_s3_minio.sh"
      - "compose.yml"
      - "compose.minio.yml"
      - "requirements.txt"
      - ".github/workflows/runtime-artifact-s3-minio.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "core/artifact_store.py"
      - "core/api/artifacts.py"
      - "core/runtime_execution.py"
      - "core/log_capture.py"
      - "core/tests/test_artifact_store.py"
      - "core/tests/test_runtime_s3_minio_integration.py"
      - "scripts/validate_runtime_s3_minio.sh"
      - "compose.yml"
      - "compose.minio.yml"
      - "requirements.txt"
      - ".github/workflows/runtime-artifact-s3-minio.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  minio-runtime-artifact-integration:
    name: MinIO-backed runtime artifact validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run MinIO/S3 runtime artifact validation
        run: |
          chmod +x scripts/validate_runtime_s3_minio.sh
          attempt=1
          max_attempts=2
          until scripts/validate_runtime_s3_minio.sh; do
            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "MinIO/S3 runtime artifact validation failed after ${attempt} attempt(s)."
              exit 1
            fi
            attempt=$((attempt + 1))
            echo "Retrying MinIO/S3 runtime artifact validation (attempt ${attempt}/${max_attempts})..."
            docker compose -f compose.yml -f compose.minio.yml down -v --remove-orphans || true
            sleep 5
          done

      - name: Tear down stack
        if: always()
        run: docker compose -f compose.yml -f compose.minio.yml down -v --remove-orphans
